name: Fuzz

# Daily fuzz run for the cargo-fuzz harnesses under fuzz/. Ut Video's
# decoder parses an attacker-controlled chunk payload against a declared
# geometry, with no external library oracle to cross-check against (the
# clean-room wall bars any reference codec source), so this is a
# decode-only panic-free harness: one target gets the whole 30-minute
# budget.

on:
  schedule:
    - cron: "53 6 * * *"   # daily 06:53 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      time_budget_seconds: 1800
    secrets: inherit
